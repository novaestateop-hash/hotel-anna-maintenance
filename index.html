  <style>
    :root{ --ink:#1c1917; --gold:#c4a882; --cream:#faf9f5; --muted:#cfc6b8; }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{min-height:100%;}
    body{ font-family:"DM Sans",system-ui,sans-serif; color:var(--cream); background:var(--ink);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 24px; position:relative; }
    .collage{ position:fixed; inset:0; z-index:0; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); }
    .collage img{ width:100%; height:100%; object-fit:cover; display:block; }
    .overlay{ position:fixed; inset:0; z-index:1;
      background: radial-gradient(ellipse at center, rgba(28,25,23,.64) 0%, rgba(28,25,23,.88) 72%, rgba(28,25,23,.95) 100%); }
    @media (max-width:640px){ .collage{ grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(4,1fr); } .collage img:nth-child(n+9){ display:none; } }
    .wrap{ position:relative; z-index:2; max-width:620px; text-align:center; }
    .eyebrow{ font-size:12px; letter-spacing:.32em; text-transform:uppercase; color:var(--gold); margin-bottom:22px; }
    .brand{ font-family:"Cormorant",Georgia,serif; font-weight:500; font-size:clamp(46px,9vw,76px); line-height:1; text-shadow:0 2px 30px rgba(0,0,0,.5); }
    .city{ font-size:13px; letter-spacing:.42em; text-transform:uppercase; color:var(--gold); margin-top:14px; }
    .rule{ width:54px; height:1px; background:var(--gold); opacity:.6; margin:30px auto; }
    .headline{ font-family:"Cormorant",Georgia,serif; font-style:italic; font-weight:400; font-size:clamp(22px,4.5vw,30px); margin-bottom:16px; text-shadow:0 2px 20px rgba(0,0,0,.5); }
    .lead{ font-size:16px; line-height:1.75; color:var(--muted); max-width:470px; margin:0 auto 30px; }
    .label{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; opacity:.85; }
    .btns{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    /* einheitliches Button-System (21st.dev-Stil) */
    .btn{ display:inline-flex; align-items:center; justify-content:center; gap:9px; text-decoration:none;
      font-family:"DM Sans",sans-serif; font-weight:500; font-size:14.5px; line-height:1;
      padding:13px 22px; border-radius:14px; letter-spacing:.01em; cursor:pointer;
      border:1px solid transparent; transition:transform .15s ease, background .2s ease, border-color .2s ease, color .2s ease; }
    .btn:hover{ transform:translateY(-2px); }
    .btn svg{ width:18px; height:18px; flex:0 0 auto; }
    /* primär: Buchung */
    .btn-primary{ background:var(--gold); color:#211d18; border-color:var(--gold); }
    .btn-primary:hover{ background:#d4ba94; border-color:#d4ba94; }
    /* dezent/glas: Kontakt — alle identisch */
    .btn-ghost{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.18); color:var(--cream); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
    .btn-ghost svg{ color:var(--gold); }
    .btn-ghost:hover{ background:rgba(255,255,255,.13); border-color:rgba(255,255,255,.30); }
    .section{ margin-top:34px; }
    .contact{ margin-top:40px; padding-top:30px; border-top:1px solid rgba(255,255,255,.12); }
    .foot{ margin-top:42px; font-size:12px; letter-spacing:.06em; color:rgba(207,198,184,.6); }
    .foot a{ color:var(--gold); text-decoration:none; }
    .foot a:hover{ text-decoration:underline; }
    .foot .sep{ opacity:.4; margin:0 10px; }
    .foot .copy{ display:block; margin-top:10px; opacity:.7; letter-spacing:.1em; }
  </style>
</head>
