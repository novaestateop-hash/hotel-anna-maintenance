<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Anna Hilden – Website im Aufbau</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { --bg:#1c1a17; --card:#262320; --gold:#c9a86a; --text:#f3efe8; --muted:#a99f90; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      background:radial-gradient(circle at 50% 0%, #2c2824 0%, var(--bg) 60%);
      color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:560px; text-align:center; background:var(--card);
      border:1px solid rgba(201,168,106,.25); border-radius:20px; padding:56px 40px;
      box-shadow:0 30px 80px rgba(0,0,0,.5); }
    .badge { display:inline-block; font-size:12px; letter-spacing:.18em; text-transform:uppercase;
      color:var(--gold); border:1px solid rgba(201,168,106,.4); border-radius:999px; padding:7px 16px; margin-bottom:28px; }
    h1 { font-size:30px; font-weight:600; letter-spacing:.02em; margin-bottom:6px; }
    .sub { color:var(--gold); font-size:15px; letter-spacing:.15em; text-transform:uppercase; margin-bottom:28px; }
    p { color:var(--muted); font-size:16px; line-height:1.7; margin-bottom:14px; }
    .contact { margin-top:32px; padding-top:24px; border-top:1px solid rgba(255,255,255,.08); }
    .contact a { color:var(--gold); text-decoration:none; font-weight:500; }
    .contact a:hover { text-decoration:underline; }
    .foot { margin-top:36px; font-size:13px; color:#6f675b; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Bald wieder für Sie da</span>
    <h1>Hotel Anna</h1>
    <div class="sub">Hilden</div>
    <p>Unsere Website wird gerade rundum erneuert.</p>
    <p>In Kürze finden Sie hier wieder alle Informationen zu Zimmern, Ausstattung und Direktbuchung.</p>
    <div class="contact">
      <p>Für Anfragen und Buchungen erreichen Sie uns gerne unter:<br />
      <!-- TODO: echte Kontaktdaten eintragen -->
      <a href="mailto:info@hotel-anna-hilden.de">info@hotel-anna-hilden.de</a></p>
    </div>
    <div class="foot">© Hotel Anna Hilden</div>
  </div>
</body>
</html>
